name: CI/CD Django App
 
on:
  push:
    branches:
      - main
 
jobs:
 
  # 🔍 JOB 1: Code Quality + Security Checks
  checks:
    runs-on: ubuntu-latest
 
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
 
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
 
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pylint bandit pip-audit
 
      # ✅ Code Style Check
      # - name: 🔎 Run Flake8
      #   run: |
      #     flake8 erp_project/core erp_project/utils \
      #     --exclude=venv,migrations,__pycache__ \
      #     --max-line-length=120
 
      # ✅ Code Quality (won’t fail pipeline)
      - name: 🧠 Run Pylint
        run: |
          pylint erp_project/core erp_project/utils || true
 
      # ✅ Security Scan (Bandit)
      - name: 🔐 Run Bandit
        run: |
          bandit -r erp_project \
          -x venv,env,__pycache__,migrations || true
 
      # ✅ Dependency Vulnerability Scan (TEMP non-blocking)
      - name: 📊 Run pip-audit
        run: |
          pip-audit || true
 
 
  # 🚀 JOB 2: Deploy to AWS EC2
  deploy:
    needs: checks
    runs-on: ubuntu-latest
 
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
 
      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
 
      - name: 🚀 Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
 
          echo "📂 Go to project directory"
          cd ${{ secrets.PROJECT_PATH }}
 
          echo "📥 Pull latest code"
          git pull origin main
 
          echo "🐍 Activate virtual environment"
          source venv/bin/activate
 
          echo "📦 Install/Update dependencies"
          pip install --upgrade pip
          pip install -r requirements.txt
 
          echo "⚙️ Apply migrations"
          cd erp_project
          python manage.py migrate
 
          echo "📁 Collect static files"
          python manage.py collectstatic --noinput
 
          echo "🔄 Restart Gunicorn"
          sudo systemctl restart gunicorn
 
          echo "🌐 Restart Nginx"
          sudo systemctl restart nginx
 
          echo "✅ Deployment Successful"
 
          EOF
 