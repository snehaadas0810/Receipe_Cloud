<!DOCTYPE html>
<html>

<head>
    <title>Create Post - RecipeGram</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background: white;
            padding: 18px 40px;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 24px;
        }

        .nav-link {
            margin: 0 12px;
            color: #475569 !important;
        }

        /* FORM CARD */
        .post-box {
            max-width: 700px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
        }

        .preview {
            width: 100%;
            margin-top: 12px;
            display: none;
            border-radius: 12px;
        }

        .btn-post {
            background: #ff4d4d;
            color: white;
            border-radius: 10px;
        }

        .btn-post:hover {
            background: #e60023;
        }

        label {
            font-weight: 500;
            margin-top: 12px;
        }
    </style>

</head>

<body>

<!-- 🔥 TOP NAVBAR -->
<nav class="navbar">
    <div class="container-fluid px-5 d-flex justify-content-between align-items-center">

        <div class="navbar-brand">🍔 RecipeGram</div>

        <div>
<a href="{% url 'posts_home' %}" class="nav-link d-inline">Home</a>
            <a href="{% url 'create_post' %}" class="nav-link d-inline fw-bold">Post</a>
            <a href="{% url 'my_posts' %}" class="nav-link d-inline">My Posts</a>
        </div>

        <div>
            👤 {{ request.user.username }}
<a href="{% url 'logout' %}" class="ms-3">Logout</a>
        </div>

    </div>
</nav>

<!-- 🔥 MAIN -->
<div class="container-fluid px-5">

    <div class="post-box">

        <h4 class="mb-3">🍳 Create New Recipe</h4>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- IMAGE -->
            <label>Upload Image</label>
            <input type="file" name="media" class="form-control" onchange="previewImage(event)" required>

            <img id="preview" class="preview">

            <!-- DESCRIPTION -->
            <label>Description</label>
            <textarea name="description" class="form-control" placeholder="Write recipe description..." required></textarea>

            <!-- INGREDIENTS -->
            <label>Ingredients</label>
            <textarea name="ingredients" class="form-control" placeholder="Enter ingredients..." required></textarea>

            <!-- PROCESS -->
            <label>Process to Make</label>
            <textarea name="process" class="form-control" placeholder="Step-by-step process..." required></textarea>

            <!-- CATEGORY -->
            <label>Category</label>
            <select name="category" class="form-control">
                <option value="veg">Veg</option>
                <option value="nonveg">Non-Veg</option>
            </select>

            <!-- BUTTONS -->
            <button class="btn btn-post w-100 mt-3">Post Recipe</button>

            <a href="/posts/" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>

        </form>

    </div>

</div>

<!-- IMAGE PREVIEW -->
<script>
function previewImage(event) {
    let reader = new FileReader();
    reader.onload = function(){
        let img = document.getElementById('preview');
        img.src = reader.result;
        img.style.display = 'block';
    }
    reader.readAsDataURL(event.target.files[0]);
}
</script>

</body>
</html>
