<!DOCTYPE html>
<html>

<head>
    <title>Create Post - RecipeGram</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #fafafa;
            font-family: 'Segoe UI', sans-serif;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            width: 240px;
            height: 100vh;
            background: white;
            border-right: 1px solid #ddd;
            padding: 20px;
        }

        /* FEED */
        .feed {
            margin-left: 260px;
            margin-right: 280px;
        }

        /* RIGHTBAR */
        .rightbar {
            position: fixed;
            right: 0;
            width: 260px;
            height: 100vh;
            background: white;
            border-left: 1px solid #ddd;
            padding: 20px;
        }

        /* FORM CARD */
        .post-box {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }

        .preview {
            width: 100%;
            margin-top: 10px;
            display: none;
            border-radius: 10px;
        }

        .btn-post {
            background: #ff4d4d;
            color: white;
        }

        .btn-post:hover {
            background: #e60023;
        }
    </style>

</head>

<body>

<!-- ✅ SIDEBAR -->
<div class="sidebar">
    <h4>🍔 RecipeGram</h4>

    <a href="/" class="btn btn-light w-100 mt-2">Home</a>

    <!-- ACTIVE -->
    <a href="{% url 'create_post' %}" class="btn btn-post w-100 mt-2">
        + Post
    </a>

    <a href="{% url 'my_posts' %}" class="btn btn-outline-primary w-100 mt-2">
        My Posts
    </a>

    <a href="/logout/" class="btn btn-outline-dark w-100 mt-2">
        Logout
    </a>
</div>

<!-- ✅ CENTER FEED -->
<div class="feed container">

    <div class="post-box">

        <h4 class="mb-3">🍳 Create New Recipe</h4>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- IMAGE -->
            <label class="form-label">Upload Image</label>
            <input type="file" name="media" class="form-control" onchange="previewImage(event)" required>

            <img id="preview" class="preview">

            <!-- DESCRIPTION -->
            <label class="form-label mt-3">Description</label>
            <textarea name="description" class="form-control" placeholder="Write recipe description..." required></textarea>

            <!-- INGREDIENTS -->
            <label class="form-label mt-3">Ingredients</label>
            <textarea name="ingredients" class="form-control" placeholder="Enter ingredients..." required></textarea>

            <!-- PROCESS -->
            <label class="form-label mt-3">Process to Make</label>
            <textarea name="process" class="form-control" placeholder="Step-by-step process..." required></textarea>

            <!-- CATEGORY -->
            <label class="form-label mt-3">Category</label>
            <select name="category" class="form-control">
                <option value="veg">Veg</option>
                <option value="nonveg">Non-Veg</option>
            </select>

            <!-- BUTTON -->
            <button class="btn btn-post w-100 mt-3">Post Recipe</button>

            <a href="/" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>

        </form>

    </div>

</div>

<!-- ✅ RIGHT SIDEBAR -->
<div class="rightbar">
    <h6>{{ request.user.username }}</h6>
    <p class="text-muted">Food Creator 🍴</p>

    <hr>

    <h6>Tips 💡</h6>
    <ul class="small text-muted">
        <li>Add clear food images</li>
        <li>Write simple steps</li>
        <li>Mention exact ingredients</li>
    </ul>

    <a href="{% url 'my_posts' %}" class="btn btn-outline-primary w-100 mt-2">
        View My Posts
    </a>
</div>

<!-- ✅ IMAGE PREVIEW SCRIPT -->
<script>
function previewImage(event) {
    let reader = new FileReader();
    reader.onload = function(){
        let img = document.getElementById('preview');
        img.src = reader.result;
        img.style.display = 'block';
    }
    reader.readAsDataURL(event.target.files[0]);
}
</script>

</body>
</html>
