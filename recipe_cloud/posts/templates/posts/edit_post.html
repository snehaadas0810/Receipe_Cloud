<!DOCTYPE html>
<html>
<head>
    <title>Edit Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">
    <h3>Edit Post</h3>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="file" name="media" class="form-control mb-2">

        <textarea name="description" class="form-control mb-2">{{ post.description }}</textarea>

        <textarea name="ingredients" class="form-control mb-2">{{ post.ingredients }}</textarea>

        <textarea name="processtomake" class="form-control mb-2">{{ post.processtomake }}</textarea>

        <select name="category" class="form-control mb-2">
            <option value="veg" {% if post.category == 'veg' %}selected{% endif %}>Veg</option>
            <option value="nonveg" {% if post.category == 'nonveg' %}selected{% endif %}>Non-Veg</option>
        </select>

        <button class="btn btn-success">Update</button>
    </form>
</div>

</body>
</html>
