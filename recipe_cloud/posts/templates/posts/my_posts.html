<!DOCTYPE html>
<html>

<head>
    <title>My Posts - RecipeGram</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background: white;
            padding: 18px 40px;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 24px;
        }

        .nav-link {
            margin: 0 12px;
            color: #475569 !important;
        }

        /* TITLE */
        .section-title {
            font-size: 28px;
            font-weight: 700;
            margin: 30px 0;
        }

        /* CARD */
        .post-card {
            border-radius: 18px;
            overflow: hidden;
            border: none;
            background: white;
            transition: 0.3s;
        }

        .post-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .post-card img {
            height: 220px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .meta {
            font-size: 13px;
            color: #64748b;
        }

        .btn-post {
            background: #ff4d4d;
            color: white;
            border-radius: 10px;
        }

        .btn-post:hover {
            background: #e60023;
        }
    </style>

</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar">
    <div class="container-fluid px-5 d-flex justify-content-between align-items-center">

        <div class="navbar-brand">🍔 RecipeGram</div>

        <div>
<a href="{% url 'posts_home' %}" class="nav-link d-inline">Home</a>
            <a href="{% url 'create_post' %}" class="nav-link d-inline">Post</a>
            <a href="{% url 'my_posts' %}" class="nav-link d-inline fw-bold">My Posts</a>
        </div>

        <div>
            👤 {{ request.user.username }}
<a href="{% url 'logout' %}" class="ms-3">Logout</a>
        </div>

    </div>
</nav>

<!-- 🔥 MAIN -->
<div class="container-fluid px-5">

    <div class="section-title">👤 My Recipes</div>

    <div class="row">

        {% for post in posts %}
        <div class="col-md-6 col-lg-3 mb-4">

            <div class="card post-card">

                <!-- IMAGE -->
                <img src="{{ post.media.url }}">

                <!-- CONTENT -->
                <div class="card-body">

                    <div class="meta mb-1">
                        {{ post.category }}
                    </div>

                    <div class="fw-semibold mb-2">
                        {{ post.description|truncatechars:50 }}
                    </div>

                    <!-- ACTION BUTTONS -->
                    <div class="d-flex gap-2">
                        <a href="{% url 'edit_post' post.id %}" class="btn btn-warning btn-sm w-50">
                            ✏️ Edit
                        </a>

                        <a href="{% url 'delete_post' post.id %}" class="btn btn-danger btn-sm w-50">
                            🗑 Delete
                        </a>
                    </div>

                </div>

            </div>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
