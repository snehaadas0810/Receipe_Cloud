<!DOCTYPE html>
<html>

<head>
    <title>My Posts - RecipeGram</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #fafafa;
            font-family: 'Segoe UI', sans-serif;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            width: 240px;
            height: 100vh;
            background: white;
            border-right: 1px solid #ddd;
            padding: 20px;
        }

        /* FEED */
        .feed {
            margin-left: 260px;
            margin-right: 280px;
        }

        /* RIGHTBAR */
        .rightbar {
            position: fixed;
            right: 0;
            width: 260px;
            height: 100vh;
            background: white;
            border-left: 1px solid #ddd;
            padding: 20px;
        }

        /* CARD */
        .post-card {
            border-radius: 12px;
            overflow: hidden;
        }

        .post-card img {
            height: 180px;
            object-fit: cover;
        }

        .btn-post {
            background: #ff4d4d;
            color: white;
        }

        .btn-post:hover {
            background: #e60023;
        }
    </style>

</head>

<body>

<!-- ✅ SAME SIDEBAR -->
<div class="sidebar">
    <h4>🍔 RecipeGram</h4>

    <a href="/" class="btn btn-light w-100 mt-2">Home</a>

    <a href="{% url 'create_post' %}" class="btn btn-post w-100 mt-2">
        + Post
    </a>

    <!-- ACTIVE -->
    <a href="{% url 'my_posts' %}" class="btn btn-primary w-100 mt-2">
        My Posts
    </a>

    <a href="/logout/" class="btn btn-outline-dark w-100 mt-2">
        Logout
    </a>
</div>

<!-- ✅ CENTER FEED -->
<div class="feed container mt-4">

    <h4>👤 My Posts</h4>

    <div class="row mt-3">
        {% for post in posts %}
        <div class="col-md-4 mb-4">

            <div class="card post-card shadow-sm">

                <!-- IMAGE -->
                <img src="{{ post.media.url }}" class="w-100">

                <!-- CONTENT -->
                <div class="p-2">
                    <small class="text-muted">
                        {{ post.category }}
                    </small>

                    <p class="mb-2">
                        {{ post.description|truncatechars:60 }}
                    </p>

                    <!-- ACTION BUTTONS -->
                    <div class="d-flex gap-2">
                        <a href="{% url 'edit_post' post.id %}" class="btn btn-warning btn-sm w-50">
                            ✏️ Edit
                        </a>

                        <a href="{% url 'delete_post' post.id %}" class="btn btn-danger btn-sm w-50">
                            🗑 Delete
                        </a>
                    </div>
                </div>

            </div>

        </div>
        {% endfor %}
    </div>

</div>

<!-- ✅ RIGHT SIDEBAR -->
<div class="rightbar">
    <h6>{{ request.user.username }}</h6>
    <p class="text-muted">Recipe Lover 🍴</p>

    <hr>

    <h6>Quick Actions</h6>

    <a href="{% url 'create_post' %}" class="btn btn-success w-100 mb-2">
        Create New Post
    </a>

    <a href="/" class="btn btn-outline-primary w-100">
        Go to Feed
    </a>
</div>

</body>
</html>
