<!DOCTYPE html>
<html>
<head>
    <title>Create Recipe</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h3 class="mb-4">🍽️ Create Recipe Post</h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <input type="file" name="media" required>
            <textarea name="description"></textarea>
            <textarea name="ingredients"></textarea>

            <button type="submit">Post</button>

            <!-- Media Upload -->
            <div class="mb-3">
                <label class="form-label">Upload Image / Video</label>
                <input type="file" name="media" class="form-control" required>
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3" placeholder="Write about your recipe..."></textarea>
            </div>

            <!-- Ingredients -->
            <div class="mb-3">
                <label class="form-label">Ingredients</label>

                <input type="text" name="ingredient1" class="form-control mb-2" placeholder="Ingredient 1">
                <input type="text" name="ingredient2" class="form-control mb-2" placeholder="Ingredient 2">
                <input type="text" name="ingredient3" class="form-control" placeholder="Ingredient 3">
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between">
                <a href="/" class="btn btn-secondary">← Back</a>
                <button type="submit" class="btn btn-primary">Post</button>
            </div>

        </form>
    </div>

</div>

</body>
</html>
