<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            height: 100vh;
        }

        .card {
            border-radius: 15px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-primary {
            background-color: #ff4d6d;
            border: none;
        }

        .btn-primary:hover {
            background-color: #e63950;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">

    <div class="card p-4 shadow" style="width: 400px;">

        <h3 class="text-center mb-3">🍽️ Create Account</h3>

        <form method="POST">
            {% csrf_token %}

            <!-- Full Name -->
            <div class="mb-2">
                <input type="text" name="fullname" class="form-control" placeholder="Full Name" required>
            </div>

            <!-- Username -->
            <div class="mb-2">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>

            <!-- Email -->
            <div class="mb-2">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>

            <!-- Password -->
            <div class="mb-2">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <!-- Confirm Password -->
            <div class="mb-2">
                <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>
            </div>

            <!-- Security Question -->
            <div class="mb-2">
                <select name="security_question" class="form-control" required>
                    <option value="">Select Security Question</option>
                    <option>What is your pet's name?</option>
                    <option>What is your favorite food?</option>
                    <option>What is your birth city?</option>
                </select>
            </div>

            <!-- Answer -->
            <div class="mb-3">
                <input type="text" name="security_answer" class="form-control" placeholder="Your Answer" required>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100">Register</button>

        </form>

        <div class="text-center mt-3">
            <a href="/login/" class="text-decoration-none">Already have an account? Login</a>
        </div>

    </div>

</div>

</body>
</html>
